<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Login - Glide</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="login-panel">
        <h1><strong>Welcome Back To Glide</strong></h1>

    </div>
    <script src="app.js"></script>
</body>
</html>
